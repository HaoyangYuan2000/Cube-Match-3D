<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Cube Match 3D</title>
<link rel="stylesheet" href="css/game.css">
</head>
<body>
<div class="ad-top"><span>📢 广告位 · Banner</span></div>
<div class="wrap">
  <div class="hud">
    <div class="hb"><div class="hl">Score</div><div class="hv" id="se">0</div></div>
    <div class="hb"><div class="hl">Level</div><div class="hv" id="le">1</div></div>
    <div class="hb" id="starHb" style="display:none">
      <div class="hl">STARS</div>
      <div id="starHv" style="font-size:20px;letter-spacing:3px;line-height:1.2;color:var(--gold)">
        <span id="s1">★</span><span id="s2">★</span><span id="s3">★</span>
      </div>
    </div>
    <div class="hb"><div class="hl">Best</div><div class="hv gold" id="be">0</div></div>
  </div>
  <div class="info-strip">
    <button class="back-btn" id="backBtn" onclick="showMenu()" style="display:none">← Menu</button>
    <span id="infoTxt">🎲 Drag to rotate · Tap gems to swap</span>
    <div class="moves-pill" id="me">20</div>
  </div>
  <div class="canvas-wrap" id="cw">
    <canvas id="c"></canvas>
    <button id="sliceBack" onclick="sliceBack()" style="display:none">← Back</button>
    <button class="slice-arrow" id="sliceCW"  onclick="applySlice(true)">↻</button>
    <button class="slice-arrow" id="sliceCCW" onclick="applySlice(false)">↺</button>
    <!-- Level Menu -->
    <div class="overlay" id="menuOv" style="gap:10px;overflow-y:auto;justify-content:flex-start;padding:16px 20px 20px;align-items:center">
      <div style="display:flex;align-items:center;gap:10px;flex-shrink:0">
        <span style="font-size:28px">🎲</span>
        <span class="ov-title" style="font-size:24px">Cube Match 3D</span>
      </div>
      <div style="font-size:11px;color:var(--muted);text-align:center;flex-shrink:0;line-height:1.6;max-width:280px">
        Drag to rotate · Tap adjacent gems to swap · Match 3 to score
      </div>
      <div class="lv-grid" id="levelGrid"></div>
    </div>
    <!-- Star Rules popup -->
    <div class="overlay hidden" id="rulesOv" style="gap:14px">
      <div class="ov-title" id="rulesTitle" style="font-size:22px">Level 1</div>
      <div style="display:flex;gap:6px;align-items:center;font-size:13px;color:var(--muted)" id="rulesMeta"></div>
      <div style="width:100%;max-width:280px;background:var(--panel);border:1px solid rgba(124,111,255,.25);border-radius:14px;padding:14px 16px;text-align:left">
        <div style="font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:10px">Star Rating</div>
        <div id="rulesStars" style="display:flex;flex-direction:column;gap:8px;font-size:13px"></div>
      </div>
      <button class="btn btn-p" style="width:100%;max-width:280px" onclick="beginPlay()">Play</button>
      <button class="btn btn-s" style="font-size:12px;padding:8px 20px" onclick="showMenu()">← Back</button>
    </div>
    <!-- Win -->
    <div class="overlay hidden" id="winOv">
      <div style="font-size:36px">🎉</div>
      <div class="ov-title">Level Complete!</div>
      <div class="ov-score" id="wsc">0</div>
      <div id="wst" style="font-size:26px">⭐⭐⭐</div>
      <button class="btn btn-p" onclick="nextLevel()">Next Level</button>
      <button class="btn btn-s" onclick="showMenu()">← Level Menu</button>
    </div>
    <!-- Game Over -->
    <div class="overlay hidden" id="ovOv">
      <div style="font-size:36px">💔</div>
      <div class="ov-title">Game Over</div>
      <div class="ov-score" id="fsc">0</div>
      <button class="btn btn-p" onclick="retryLevel()">Try Again</button>
      <button class="btn btn-s" onclick="showMenu()">← Level Menu</button>
    </div>
  </div>
  <!-- Tool bar -->
  <div class="tool-bar" id="toolBar" style="display:none">
    <button class="tool-btn" id="sliceBtn" onclick="startSlice()">
      <div class="tool-icon" id="sliceIcon">
        <div class="rc-face">
          <div class="rc-cell" style="background:#ef4444"></div><div class="rc-cell" style="background:#3b82f6"></div><div class="rc-cell" style="background:#22c55e"></div>
          <div class="rc-cell" style="background:#f59e0b"></div><div class="rc-cell" style="background:#eeeeff"></div><div class="rc-cell" style="background:#a855f7"></div>
          <div class="rc-cell" style="background:#3b82f6"></div><div class="rc-cell" style="background:#ef4444"></div><div class="rc-cell" style="background:#f59e0b"></div>
        </div>
      </div>
      <span class="tool-label">Slice</span>
    </button>
  </div>
</div>
<div class="ad-bot"><span>📢 广告位 · Banner</span></div>
<div id="iad" class="hidden">
  <div style="font-size:11px;color:var(--muted)">广告</div>
  <div style="width:300px;height:250px;background:var(--panel);border-radius:18px;display:flex;align-items:center;justify-content:center;border:1px solid rgba(124,111,255,.3);color:var(--muted);font-size:13px;text-align:center">📱<br><br>300×250 插屏广告</div>
  <div id="adt" style="font-size:12px;color:var(--muted)">5秒后可关闭</div>
  <button id="adcls" onclick="closeAd()">关闭 ✕</button>
</div>
<script src="js/math.js"></script>
<script src="js/config.js"></script>
<script src="js/state.js"></script>
<script src="js/render.js"></script>
<script src="js/board.js"></script>
<script src="js/slice.js"></script>
<script src="js/input.js"></script>
<script src="js/ui.js"></script>
</body>
</html>
