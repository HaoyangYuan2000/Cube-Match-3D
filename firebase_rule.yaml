rules_version = '2';
service cloud.firestore {
  match /databases/{database}/documents {

    match /players/{uid} {
      allow read: if request.auth != null;
      allow create: if request.auth != null && request.auth.uid == uid;
      allow update: if request.auth != null && request.auth.uid == uid;
    }

    match /nicknames/{name} {
      allow read: if request.auth != null;
      allow write: if request.auth != null;
    }

    match /leaderboard_classic/{doc} {
      allow read: if request.auth != null;
      allow write: if request.auth != null;
    }

    match /leaderboard_timed/{doc} {
      allow read: if request.auth != null;
      allow write: if request.auth != null;
    }

    match /friendRequests/{docId} {
      allow read: if request.auth != null &&
        request.auth.token.firebase.sign_in_provider != 'anonymous' &&
        (resource == null ||
         resource.data.toUid == request.auth.uid ||
         resource.data.from == request.auth.uid);
      allow create: if request.auth != null &&
        request.auth.token.firebase.sign_in_provider != 'anonymous' &&
        request.resource.data.from == request.auth.uid;
      allow delete: if request.auth != null &&
        request.auth.token.firebase.sign_in_provider != 'anonymous' &&
        (resource.data.toUid == request.auth.uid ||
         resource.data.from == request.auth.uid);
    }

    match /friendships/{docId} {
      allow read: if request.auth != null &&
        request.auth.token.firebase.sign_in_provider != 'anonymous' &&
        (resource.data.uid1 == request.auth.uid || resource.data.uid2 == request.auth.uid);
      allow create: if request.auth != null &&
        request.auth.token.firebase.sign_in_provider != 'anonymous' &&
        (request.resource.data.uid1 == request.auth.uid || request.resource.data.uid2 == request.auth.uid);
      allow delete: if request.auth != null &&
        request.auth.token.firebase.sign_in_provider != 'anonymous' &&
        (resource.data.uid1 == request.auth.uid || resource.data.uid2 == request.auth.uid);
    }
  }
}