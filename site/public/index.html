<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cube Match 3D</title>
<style>
  :root{ --ink:#1a1a2e; --deep:#16213e; --accent:#e94560; --bg:#0d1117; }
  *{box-sizing:border-box;}
  body{ margin:0; background:var(--bg); color:#fff;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    min-height:100vh; text-align:center; padding:32px; }
  h1{ font-size:36px; margin:0 0 8px; }
  h1 span{ color:var(--accent); }
  p{ color:#8b949e; font-size:16px; max-width:480px; line-height:1.6; }
  .badge{ display:inline-block; margin-top:24px; background:var(--accent);
    color:#fff; padding:12px 28px; border-radius:8px; text-decoration:none;
    font-weight:600; font-size:16px; }
  .links{ margin-top:32px; font-size:14px; color:#8b949e; }
  .links a{ color:#8b949e; margin:0 12px; }
</style>
</head>
<body>
  <h1>Cube Match <span>3D</span></h1>
  <p>A fun block elimination puzzle game. Match colorful 3D cubes, clear the board, and beat other players!</p>
  <a class="badge" href="https://play.google.com/store/apps/details?id=ai.nextad.cubematch3d">Get it on Google Play</a>
  <div class="links">
    <a href="/privacy">Privacy Policy</a>
  </div>
</body>
</html>
