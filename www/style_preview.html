<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body{margin:0;background:#0e0a26;display:flex;flex-wrap:wrap;gap:16px;padding:16px;}
canvas{display:block;}
.label{color:#fff;font-family:sans-serif;font-size:13px;text-align:center;margin-top:6px;}
.block{display:flex;flex-direction:column;align-items:center;}
</style>
</head>
<body>
<script>
const COLORS = ['#e84444','#4488ee','#28cc66','#eebb22','#8822cc'];
const COLORS_LO = ['#bb0808','#0044cc','#008833','#cc5500','#550099'];

function hexToRgb(h){
  const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);
  return [r,g,b];
}
function rgbToHex(r,g,b){
  return '#'+[r,g,b].map(v=>Math.max(0,Math.min(255,Math.round(v))).toString(16).padStart(2,'0')).join('');
}
function shade(hex, f){
  const [r,g,b]=hexToRgb(hex);
  return rgbToHex(r*f,g*f,b*f);
}

function makeCanvas(w,h){
  const c=document.createElement('canvas');
  c.width=w; c.height=h;
  return c;
}

// ── Style renderers (each draws one block at cx,cy with half-size s) ──

function drawOriginal(ctx, cx, cy, col, s){
  const bv = s*0.22;
  const hi = s - bv;
  // top bevel
  ctx.beginPath();
  ctx.moveTo(cx-s,cy-s); ctx.lineTo(cx+s,cy-s);
  ctx.lineTo(cx+hi,cy-hi); ctx.lineTo(cx-hi,cy-hi); ctx.closePath();
  ctx.fillStyle=shade(col,1.35); ctx.fill();
  // left bevel
  ctx.beginPath();
  ctx.moveTo(cx-s,cy+s); ctx.lineTo(cx-s,cy-s);
  ctx.lineTo(cx-hi,cy-hi); ctx.lineTo(cx-hi,cy+hi); ctx.closePath();
  ctx.fillStyle=shade(col,1.20); ctx.fill();
  // right bevel
  ctx.beginPath();
  ctx.moveTo(cx+s,cy-s); ctx.lineTo(cx+s,cy+s);
  ctx.lineTo(cx+hi,cy+hi); ctx.lineTo(cx+hi,cy-hi); ctx.closePath();
  ctx.fillStyle=shade(COLORS_LO[COLORS.indexOf(col)],0.72); ctx.fill();
  // bottom bevel
  ctx.beginPath();
  ctx.moveTo(cx+s,cy+s); ctx.lineTo(cx-s,cy+s);
  ctx.lineTo(cx-hi,cy+hi); ctx.lineTo(cx+hi,cy+hi); ctx.closePath();
  ctx.fillStyle=shade(COLORS_LO[COLORS.indexOf(col)],0.60); ctx.fill();
  // face gradient
  ctx.beginPath();
  ctx.rect(cx-hi,cy-hi,hi*2,hi*2);
  const g=ctx.createLinearGradient(cx-hi,cy-hi,cx+hi,cy+hi);
  g.addColorStop(0,col);
  g.addColorStop(1,shade(COLORS_LO[COLORS.indexOf(col)],1.4));
  ctx.fillStyle=g; ctx.fill();
}

function drawSoftBevel(ctx, cx, cy, col, s){
  const r=12;
  // shadow
  ctx.save();
  ctx.shadowColor='rgba(0,0,0,0.5)'; ctx.shadowBlur=8; ctx.shadowOffsetY=3;
  roundRect(ctx,cx-s,cy-s,s*2,s*2,r);
  ctx.fillStyle=shade(col,0.55); ctx.fill();
  ctx.restore();
  // outer rim
  roundRect(ctx,cx-s,cy-s,s*2,s*2,r);
  ctx.fillStyle=shade(col,0.55); ctx.fill();
  // main face inset
  const bv=5;
  roundRect(ctx,cx-s+bv,cy-s+bv,s*2-bv*2,s*2-bv*2,r-3);
  ctx.fillStyle=col; ctx.fill();
  // top highlight
  roundRect(ctx,cx-s+bv+4,cy-s+bv+4,s*2-bv*2-8,s-bv-2,r-5);
  ctx.fillStyle='rgba(255,255,255,0.22)'; ctx.fill();
}

function drawGlowRound(ctx, cx, cy, col, s){
  const r=14;
  const [cr,cg,cb]=hexToRgb(col);
  // glow
  ctx.save();
  ctx.shadowColor=col; ctx.shadowBlur=14;
  roundRect(ctx,cx-s+3,cy-s+3,s*2-6,s*2-6,r);
  ctx.fillStyle=col; ctx.fill();
  ctx.restore();
  // dark rim
  roundRect(ctx,cx-s,cy-s,s*2,s*2,r);
  ctx.fillStyle=rgbToHex(cr*0.4,cg*0.4,cb*0.4); ctx.fill();
  // bright face
  roundRect(ctx,cx-s+4,cy-s+4,s*2-8,s*2-8,r-2);
  ctx.fillStyle=col; ctx.fill();
  // top shine
  roundRect(ctx,cx-s+8,cy-s+8,s*2-16,s-6,r-5);
  ctx.fillStyle='rgba(255,255,255,0.28)'; ctx.fill();
}

function drawInset(ctx, cx, cy, col, s){
  const r=16;
  const [cr,cg,cb]=hexToRgb(col);
  // bottom shadow
  roundRect(ctx,cx-s,cy-s+4,s*2,s*2,r);
  ctx.fillStyle=rgbToHex(cr*0.35,cg*0.35,cb*0.35); ctx.fill();
  // main
  roundRect(ctx,cx-s,cy-s,s*2,s*2,r);
  ctx.fillStyle=col; ctx.fill();
  // top highlight bar
  roundRect(ctx,cx-s+6,cy-s+6,s*2-12,14,r-6);
  ctx.fillStyle='rgba(255,255,255,0.35)'; ctx.fill();
  // inner border
  ctx.save();
  roundRect(ctx,cx-s+2,cy-s+2,s*2-4,s*2-4,r-1);
  ctx.strokeStyle='rgba(255,255,255,0.15)'; ctx.lineWidth=1.5; ctx.stroke();
  ctx.restore();
}

function drawPastel(ctx, cx, cy, col, s){
  const [cr,cg,cb]=hexToRgb(col);
  const avg=(cr+cg+cb)/3;
  const pr=Math.min(cr*0.5+avg*0.5+55,255);
  const pg=Math.min(cg*0.5+avg*0.5+55,255);
  const pb=Math.min(cb*0.5+avg*0.5+55,255);
  const r=13;
  ctx.save();
  ctx.shadowColor='rgba(0,0,0,0.3)'; ctx.shadowBlur=6; ctx.shadowOffsetY=3;
  roundRect(ctx,cx-s,cy-s,s*2,s*2,r);
  ctx.fillStyle=rgbToHex(pr,pg,pb); ctx.fill();
  ctx.restore();
  roundRect(ctx,cx-s,cy-s,s*2,s*2,r);
  ctx.fillStyle=rgbToHex(pr,pg,pb); ctx.fill();
  roundRect(ctx,cx-s+5,cy-s+5,s*2-10,s-4,r-4);
  ctx.fillStyle='rgba(255,255,255,0.45)'; ctx.fill();
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

const styles = [
  {name:'现有风格 (参考)', fn: drawOriginal},
  {name:'1 · 柔化斜面', fn: drawSoftBevel},
  {name:'2 · 发光圆角', fn: drawGlowRound},
  {name:'3 · 圆角内嵌', fn: drawInset},
  {name:'4 · 柔和马卡龙', fn: drawPastel},
];

const S = 26; // half-size
const GAP = 8;
const cols = COLORS.length;
const W = cols*(S*2+GAP)+GAP;
const H = S*2+GAP*2;

styles.forEach(({name, fn})=>{
  const wrap=document.createElement('div');
  wrap.className='block';

  const c=makeCanvas(W,H);
  const ctx=c.getContext('2d');
  ctx.fillStyle='#0e0a26';
  ctx.fillRect(0,0,W,H);

  COLORS.forEach((col,i)=>{
    const cx=GAP+S + i*(S*2+GAP);
    const cy=GAP+S;
    fn(ctx, cx, cy, col, S);
  });

  const lbl=document.createElement('div');
  lbl.className='label';
  lbl.textContent=name;
  wrap.appendChild(c);
  wrap.appendChild(lbl);
  document.body.appendChild(wrap);
});
</script>
</body>
</html>
